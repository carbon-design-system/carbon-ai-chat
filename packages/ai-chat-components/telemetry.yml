# yaml-language-server: $schema=https://unpkg.com/@ibm/telemetry-config-schema@v1/dist/config.schema.json

version: 1
projectId: 62aa153d-8a70-4d12-9e8d-069511e80e65
endpoint: https://www-api.ibm.com/ibm-telemetry/v1/metrics
collect:
  wc:
    elements:
      allowedAttributeNames:
        # General
        - actions
        - align
        - autoalign
        - closed-label-text
        - collapse-label
        - controlled
        - disabled
        - expand-label
        - id
        - lines
        - open
        - open-label-text
        - overflow
        - panel-id
        - size
        - slot
        - title
        - type
        - value
        # cds-aichat-button
        - is-quick-action
        # cds-aichat-card
        - is-flush
        - is-layered
        # cds-aichat-card-footer
        - is-icon-button
        - oncds-aichat-card-footer-action
        # cds-aichat-card-steps
        - steps
        # cds-aichat-chain-of-thought
        - onchain-of-thought-toggled
        # cds-aichat-chain-of-thought-step
        - label-text
        - onchain-of-thought-step-beingtoggled
        - onchain-of-thought-step-toggled
        - status
        - status-failed-label-text
        - status-processing-label-text
        - status-succeeded-label-text
        - step-number
        # cds-aichat-chain-of-thought-toggle
        - onchain-of-thought-toggle
        # cds-aichat-chat-header
        - header-name
        - header-title
        - navigation-back-label
        - navigation-overflow-label
        - navigation-type
        # cds-aichat-code-snippet
        - aria-label-editable
        - aria-label-readonly
        - code
        - copy-button-tooltip-content
        - copy-text
        - default-language
        - editable
        - fold-collapse-label
        - fold-expand-label
        - hide-copy-button
        - hide-header
        - highlight
        - language
        - max-collapsed-number-of-rows
        - max-expanded-number-of-rows
        - min-collapsed-number-of-rows
        - min-expanded-number-of-rows
        - oncontent-change
        - show-less-text
        - show-more-text
        # cds-aichat-feedback
        - body
        - categories-label
        - class
        - disclaimer
        - is-open
        - is-readonly
        - onfeedback-close
        - onfeedback-submit
        - primary-label
        - secondary-label
        - show-body
        - show-text-area
        - text-area-placeholder
        # cds-aichat-feedback-buttons
        - has-negative-details
        - has-positive-details
        - is-negative-disabled
        - is-negative-open
        - is-negative-selected
        - is-positive-disabled
        - is-positive-open
        - is-positive-selected
        - negative-label
        - onfeedback-buttons-click
        - positive-label
        # cds-aichat-markdown
        - code-snippet-aria-label-editable
        - code-snippet-aria-label-readonly
        - code-snippet-copy-button-tooltip-content
        - code-snippet-highlight
        - code-snippet-show-less-text
        - code-snippet-show-more-text
        - markdown
        - remove-html
        - sanitize-html
        - streaming
        - table-download-label-text
        - table-filter-placeholder-text
        - table-items-per-page-text
        - table-locale
        - table-next-page-text
        - table-previous-page-text
        # cds-aichat-processing
        - loop
        - quick-load
        # cds-aichat-reasoning-step
        - onreasoning-step-beingtoggled
        - onreasoning-step-toggled
        # cds-aichat-reasoning-steps-toggle
        - onreasoning-steps-toggle
        # cds-aichat-table
        - default-page-size
        - download-label-text
        - filter-placeholder-text
        - items-per-page-text
        - loading
        - locale
        - next-page-text
        - previous-page-text
        - table-description
        - table-title
        # cds-aichat-tool-call-data
        - input-label-text
        - output-label-text
        - tool-label-text
        - tool-name
        # cds-aichat-toolbar
        - nameText
        - titleText
        # cds-aichat-workspace-shell
        - auto-collapsible-header
        # cds-aichat-workspace-shell-footer
        - oncds-aichat-workspace-shell-footer-clicked
        # cds-aichat-workspace-shell-header
        - collapsible
        - onworkspace-header-toggle
        - subtitle-text
        - title-text
      allowedAttributeStringValues:
        # General - boolean attributes
        - "true"
        - "false"
        # General - type
        - expand
        - tooltip
        # cds-aichat-chain-of-thought-step - status
        - failure
        - processing
        - success
        # cds-aichat-chat-header - navigation-type
        - back
        - none
        - overflow
  npm:
    dependencies: null
  js:
    functions: {}
    tokens: null
