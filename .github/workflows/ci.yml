name: ci-check
on:
  push:
    branches: [ main, release/v*, carbon-react-web-components-integration ]
  pull_request:
    branches: [ main, release/v*, carbon-react-web-components-integration ]
  merge_group:
    types: [checks_requested]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: "npm"
      - name: Install dependencies
        run: npm install
      - name: Run build
        run: npm run build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: "npm"
      - name: Install dependencies
        run: |
          npm install
          npx playwright install --with-deps
      - name: Build ai-chat
        run: npm run aiChat:build
      - name: Build ai-chat-components
        run: cd packages/ai-chat-components && npm run build
      - name: Run test
        run: npm run test
      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Build or test process generated or modified files that are not committed."
            echo "::error::This will cause Lerna publish to fail. Please commit these changes or update .gitignore."
            echo ""
            echo "Modified files:"
            git status --porcelain
            echo ""
            echo "Detailed changes:"
            git diff
            exit 1
          else
            echo "✓ No uncommitted changes detected"
          fi

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: "npm"
      - name: Install dependencies
        run: npm install
      - name: Check formatting of project files (staged)
        if: ${{ github.event_name == 'pull_request' }}
        run: npm run format:staged
      - name: Check formatting of project files (non-staged)
        if: ${{ github.event_name != 'pull_request' }}
        run: npm run format

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: "npm"
      - name: Install dependencies
        run: npm install
      - name: Lint
        run: npm run lint && npm run lint:styles

  license:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: "npm"
      - name: Install dependencies
        run: npm install
      - name: License check
        run: npm run lint:license
